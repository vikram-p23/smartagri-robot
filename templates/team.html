{% extends "base.html" %}
{% block content %}

<div id="team" class="tab-content active mt-5">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                <div class="card-icon">💬</div>
                <span data-lang-key="titleTeamHub">Team Hub</span>
            </h3>
        </div>

        <div class="team-hub-container">
            
            <div class="message-area" id="messageArea"
                style="height: 350px; overflow-y: auto; padding: 1rem; border: 1px solid #ccc; border-radius: 10px; background: #f9f9f9;">
            </div>

           
            <form class="message-input-area" id="messageForm" style="display: flex; gap: 8px; margin-top: 10px;">
                <input type="text" id="messageInput" class="form-input" placeholder="Type your message..."
                    style="padding-left: 1rem; flex-grow: 1;">
                <button type="submit" class="btn btn-secondary" data-lang-key="btnSend">Send</button>
            </form>
        </div>
    </div>
</div>


<script>
    const messageArea = document.getElementById('messageArea');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');

   
    let messages = JSON.parse(localStorage.getItem('teamMessages')) || [];

    function renderMessages() {
        messageArea.innerHTML = messages.map(msg => `
            <div style="
                display: flex;
                justify-content: flex-end;
                margin-bottom: 10px;
            ">
                <div style="
                    background: linear-gradient(135deg, #007bff, #00b4d8);
                    color: white;
                    padding: 10px 14px;
                    border-radius: 12px 12px 0 12px;
                    max-width: 75%;
                    text-align: right;
                    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
                ">
                    <div>${msg.text}</div>
                    <div style="font-size: 0.8em; color: #e0e0e0; margin-top: 4px;">${msg.time}</div>
                </div>
            </div>
        `).join('');
        messageArea.scrollTop = messageArea.scrollHeight;
        
    }

    renderMessages();

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;

        const time = new Date().toLocaleTimeString();
        const newMsg = { text, time };

        messages.unshift(newMsg); 

        localStorage.setItem('teamMessages', JSON.stringify(messages));

        renderMessages();
        messageInput.value = '';
    });
</script>

{% endblock %}
